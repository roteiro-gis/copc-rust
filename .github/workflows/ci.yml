name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
      - "copc-core-v*"
      - "copc-reader-v*"
      - "copc-writer-v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-features --locked

  docs:
    name: Documentation
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install 1.77.0 --profile minimal --no-self-update

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo +1.77.0 check --workspace --all-targets --locked

  package:
    name: Packaging
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Verify crate packages
        run: cargo package --workspace --locked

      - name: Verify publish dry run
        run: cargo publish --workspace --dry-run --locked
